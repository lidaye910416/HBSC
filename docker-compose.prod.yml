version: '3.9'

# 生产环境 compose — 使用已构建镜像 hbsc-backend:latest / hbsc-frontend:latest
# 与 docker-compose.yml (dev) 区别：
#   - 不 build，image: hbsc-*:latest
#   - 后端无 bind mount（镜像自包含）
#   - 保留 backend_uploads 命名卷
#   - 加 nginx 反向代理（80 端口对外）

services:
  backend:
    image: hbsc-backend:latest
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./research.db
      - DEBUG=false
      - SECRET_KEY=${JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-32}
      - ADMIN_SETTINGS_SECRET=${ADMIN_SETTINGS_SECRET:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - UPLOAD_DIR=./uploads
      - IMAGE_MAX_SIZE_MB=5
      - DOCX_MAX_SIZE_MB=50
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: hbsc-frontend:latest
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  # 生产环境 Nginx 反向代理（对外 80 端口）
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
