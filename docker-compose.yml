version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./research.db
      - DEBUG=false
      - SECRET_KEY=${JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-32}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - UPLOAD_DIR=./uploads
      - UPLOAD_MAX_SIZE_MB=5
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    restart: unless-stopped

volumes:
  backend_uploads:

  frontend:
    build:
      context: ./frontend-vite
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # 生产环境 Nginx 反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
