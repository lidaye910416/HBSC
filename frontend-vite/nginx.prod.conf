server {
    listen 18889;
    server_name localhost;
    client_max_body_size 50m;

    # /api/* → hbsc-api container (the deploy-service skill exposes the
    # backend on container_port:host_port = 8000:18000, but the nginx
    # container reaches the api container over the shared docker network
    # on container port 8000, not host port 18000).
    location /api/ {
        proxy_pass http://app-hbsc-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /uploads/* → hbsc-api (FastAPI serves uploaded media at this path)
    location /uploads/ {
        proxy_pass http://app-hbsc-api:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # everything else → static SPA
    location / {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
