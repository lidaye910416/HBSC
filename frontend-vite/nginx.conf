server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Allow up to 64 MB requests on /api/. The backend enforces a
        # 50 MB cap on .docx uploads; 64 MB gives headroom for multipart
        # envelope overhead (boundaries, headers, other form fields).
        client_max_body_size 64m;
    }
}
